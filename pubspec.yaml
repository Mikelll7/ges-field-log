name: ges_field_log
description: GES Wildlife Ranger Field Log - Offline-first sighting logger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database - offline storage
  sqflite: ^2.3.3
  path: ^1.9.0

  # GPS / Location
  geolocator: ^13.0.2

  # Camera / Image picker
  image_picker: ^1.1.2

  # HTTP client for API sync
  dio: ^5.7.0

  # Connectivity detection
  connectivity_plus: ^6.1.1

  # UUID for unique IDs
  uuid: ^4.5.1

  # Path provider for file storage
  path_provider: ^2.1.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true